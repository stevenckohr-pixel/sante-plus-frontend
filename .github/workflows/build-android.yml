name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Create package.json
        run: echo '{"name":"app","version":"1.0.0"}' > package.json
      
      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "SantePlus" "com.santeplus.app"
          npx cap add android
      
      - name: Copy web files
        run: |
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          rm -rf www/android www/.github www/node_modules www/www 2>/dev/null || true
      
      - name: Update config
        run: |
          echo '{
            "appId": "com.santeplus.app",
            "appName": "SantePlus",
            "webDir": "www"
          }' > capacitor.config.json
      
      - name: Sync
        run: npx cap sync android
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SantePlus-App
          path: android/app/build/outputs/apk/debug/app-debug.apk

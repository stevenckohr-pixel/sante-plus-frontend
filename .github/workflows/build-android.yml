name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Create Capacitor project
        run: |
          mkdir capacitor-app
          cd capacitor-app
          npm init -y
          npm install @capacitor/core@6.0.0 @capacitor/cli@6.0.0 @capacitor/android@6.0.0
          npx cap init "SantePlus" "com.santeplus.app" --web-dir=../www
          npx cap add android
          cd ..
      
      - name: Copy web files
        run: |
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
          cp -r capacitor-app/android ./
          cp -r capacitor-app/www/* www/ 2>/dev/null || true
      
      - name: Configure Android
        run: |
          # Ajouter le namespace dans build.gradle
          sed -i '1i namespace "com.santeplus.app"' android/app/build.gradle
          
          # Mettre à jour le AndroidManifest.xml
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.santeplus.app">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name="com.santeplus.app.MainActivity"
                      android:label="@string/app_name"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SantePlus-App
          path: android/app/build/outputs/apk/debug/app-debug.apk

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors-ligne - Santé Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50">
    <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
        <div class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mb-6">
            <i class="fa-solid fa-wifi-slash text-4xl text-slate-400"></i>
        </div>
        <h1 class="text-2xl font-black text-slate-800 mb-2">Vous êtes hors-ligne</h1>
        <p class="text-slate-500 mb-6">Veuillez vérifier votre connexion internet.</p>
        <button onclick="location.reload()" class="px-6 py-3 bg-emerald-500 text-white rounded-xl font-bold">
            <i class="fa-solid fa-rotate-right mr-2"></i> Réessayer
        </button>
        <button onclick="window.location.href='./'" class="mt-3 px-6 py-3 bg-slate-200 text-slate-700 rounded-xl font-bold">
            <i class="fa-solid fa-home mr-2"></i> Accueil
        </button>
    </div>
</body>
</html>

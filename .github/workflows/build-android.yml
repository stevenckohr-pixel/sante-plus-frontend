name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
      
      - name: Create package.json
        run: echo '{"name":"app","version":"1.0.0"}' > package.json
      
      - name: Install Capacitor 5
        run: |
          npm install @capacitor/core@5.7.0 @capacitor/cli@5.7.0 @capacitor/android@5.7.0
          npx cap init "SantePlus" "com.santeplus.app" --web-dir=www
          npx cap add android
      
      - name: Copy web files
        run: |
          mkdir -p www
          cp -r * www/ 2>/dev/null || true
      
      - name: Sync
        run: npx cap sync android
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SantePlus-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
